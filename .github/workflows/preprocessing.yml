name: Preprocessing Dataset

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn numpy

      - name: Run preprocessing script
        run: |
          python preprocessing/automate_Najwan_Mursyidan.py

      - name: Check preprocessing result
        run: |
          ls -la preprocessing
          test -f preprocessing/breast_cancer_preprocessing.csv

      - name: Commit processed dataset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update preprocessed dataset"
          file_pattern: preprocessing/breast_cancer_preprocessing.csv
